model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"
personality = "pragmatic"

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[features]
shell_snapshot = true
web_search_request = false

[sandbox_workspace_write]
network_access = false

[history]
persistence = "none"

[analytics]
enabled = false

[feedback]
enabled = false

[otel]
exporter = "none"
metrics_exporter = "none"
trace_exporter = "none"

[tui]
notifications = true

[shell_environment_policy]
inherit = "core"
include_only = [
  "PATH",
  "HOME",
  "USER",
  "SHELL",
  "LANG",
  "LC_ALL",
  "VIRTUAL_ENV",
  "PYTHONPATH"
]
exclude = [
  "*KEY*",
  "*SECRET*",
  "*TOKEN*",
  "AWS_*",
  "AZURE_*",
  "GCP_*",
  "GOOGLE_*",
  "OPENAI_*"
]

[profiles.fast]
model_reasoning_effort = "low"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[profiles.deep]
model_reasoning_effort = "high"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# For planning, reading, and audits without edits
[profiles.readonly]
sandbox_mode = "read-only"
approval_policy = "never"
