model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
personality = "pragmatic"

default_permissions = "private"

[permissions.private.filesystem]
"/Users/max.kryvych/.aws" = "none"
"/Users/max.kryvych/.azure" = "none"
"/Users/max.kryvych/.config/gh" = "none"
"/Users/max.kryvych/.docker/config.json" = "none"
"/Users/max.kryvych/.gem/credentials" = "none"
"/Users/max.kryvych/.git-credentials" = "none"
"/Users/max.kryvych/.gnupg" = "none"
"/Users/max.kryvych/.kube" = "none"
"/Users/max.kryvych/.netrc" = "none"
"/Users/max.kryvych/.npm" = "none"
"/Users/max.kryvych/.npmrc" = "none"
"/Users/max.kryvych/.pypirc" = "none"
"/Users/max.kryvych/.ssh" = "none"

[permissions.private.filesystem.":project_roots"]
".env" = "none"
".env.local" = "none"
".env.production" = "none"
"secrets" = "none"
"config/credentials.json" = "none"

[analytics]
enabled = false

[feedback]
enabled = false

[otel]
exporter = "none"
metrics_exporter = "none"
trace_exporter = "none"

[shell_environment_policy]
inherit = "core"
exclude = ["*_TOKEN", "*_SECRET", "*_KEY", "AWS_*", "GITHUB_TOKEN"]
